apiVersion: apps/v1
kind: Deployment
metadata:
  name: adminer-deployment
  labels:
    app: smart-health-adminer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smart-health-adminer
  template:
    metadata:
      labels:
        app: smart-health-adminer
    spec:
      containers:
        - name: adminer
          image: adminer:latest
          ports:
            - containerPort: 8080
              name: adminer
---
apiVersion: v1
kind: Service
metadata:
  name: adminer-service
  labels:
    app: smart-health-adminer
spec:
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080  # Expose port externally at http://<node-ip>:30080
  selector:
    app: smart-health-adminer
  type: NodePort
