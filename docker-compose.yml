version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: smart_health_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_pass_123
      POSTGRES_DB: smart_health
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    container_name: smart_health_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

  backend:
    build: ./backend
    container_name: smart_health_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres_secure_pass_123@db:5432/smart_health?schema=public"
      JWT_SECRET: "super_secret_key_for_ai_health_center_management"
      PORT: 5000
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: smart_health_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
